name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'src/**'
      - 'public/**'
      - 'content/**'
      - 'private'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'wrangler.jsonc'
      - 'astro.config.mjs'
      - 'banners.config.ts'
      - 'website.config.ts'

permissions:
  pull-requests: write
  contents: read

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    
    if: >
      github.event.pull_request.author_association == 'COLLABORATOR' ||
      github.event.pull_request.author_association == 'MEMBER' ||
      github.event.pull_request.author_association == 'OWNER'

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: |
            ${{ github.event.repository.name }}
            amase.cc-part-priv

      - name: Checkout Repository with Submodules
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          submodules: 'true'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install dependencies & Build Astro
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        id: wrangler_deploy
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --preview --name amase-cc-pr-${{ github.event.pull_request.number }}

      - name: Comment PR with Preview URL
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview-deploy
          message: |
            ### ⚡️ Preview is ready!
            
            * **Deployed Date:** ${{ github.event.pull_request.updated_at }}
            * **Preview URL:** [View](${{ steps.wrangler_deploy.outputs.deployment-url }})
            * **PR Number:** #${{ github.event.pull_request.number }}
